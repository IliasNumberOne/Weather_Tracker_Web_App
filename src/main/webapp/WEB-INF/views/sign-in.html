<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="style.css">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-6">
            <div class="weather-logo"></div>
        </div>
    </div>

    <h2 class="text-center mb-5">Sign In</h2>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-4 col-md-6 col-sm-12">
            <div class="alert alert-danger"
                 th:if="${error}"
                 th:text="${error}">
            </div>

            <form th:object="${authorizationRequest}" th:action="@{/auth/sign-in}" method="post" class="mt-4">
                <div class="mb-3">
                    <label for="login" class="form-label">Login</label>
                    <input type="email"
                           th:field="*{login}"
                           class="form-control"
                           id="login"
                           placeholder="you@example.com"
                           th:classappend="${#fields.hasErrors('login')} ? ' is-invalid' : ''"
                    />
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('login')}"
                         th:errors="*{login}">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password"
                           th:field="*{password}"
                           class="form-control"
                           id="password"
                           th:classappend="${#fields.hasErrors('password')} ? ' is-invalid' : ''"/>
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">Sign In</button>
                <p class="mt-2 text-center">Don't have an account? <a th:href="@{/auth/sign-up}">Sign up here</a></p>
            </form>
        </div>
    </div>
</div>

</body>
</html>
