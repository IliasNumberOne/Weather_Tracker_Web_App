<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Homepage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/home}">
            <img th:src="@{/images/weather-app.png}" alt="" width="30" height="24"
                 class="d-inline-block align-text-top">
            Weather Tracker
        </a>
        <div class="d-flex align-items-center">
            <span class="navbar-text me-3" th:text="${user.login}"></span>
            <form th:action="@{/auth/sign-out}" method="post">
                <button type="submit" class="btn btn-outline-danger">Sign out</button>
            </form>
        </div>
    </div>
</nav>

<section id="page-content">
    <div class="container mt-4">

        <form th:action="@{/location/search}" method="get">
            <div class="d-flex my-4">
                <div class="input-group location-search-input-group me-3">
                    <input class="form-control" t
                           ype="text"
                           name="searchQuery"
                           placeholder="Enter location" required>
                    <button class="btn btn-outline-secondary btn-sm clear-input-button" type="button"
                            onclick="this.previousElementSibling.value=''">
                        &times;
                    </button>
                </div>
                <button class="btn btn-outline-success">
                    Search
                </button>
            </div>
        </form>

        <div>
            <h2>Locations:</h2>

            <div class="row">
                <div class="col-12 col-lg-3 col-md-6 mb-4"
                     th:each="loc : ${foundLocations}">
                    <div class="card h-100">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title"
                                th:text="${loc.name()}"></h5>
                            <p class="card-text mb-1">
                                Latitude: <span th:text="${loc.lat()}"></span>
                            </p>
                            <p class="card-text mb-1">
                                Longitude: <span th:text="${loc.lon()}"></span>
                            </p>
                            <p class="card-text mb-1">
                                Country: <span th:text="${loc.country()}"></span>
                            </p>
                            <p class="card-text mb-3">
                                State: <span th:text="${loc.state()}"></span>
                            </p>


                            <div class="mt-auto" th:if="${user}">
                                <form th:action="@{/location}" method="post"
                                      th:if="${!locationSaved[loc.name() + '-' + loc.country() + '-' + (loc.state != null ? loc.state : '')]}">
                                    <input type="hidden" name="name" th:value="${loc.name}">
                                    <input type="hidden" name="lat" th:value="${loc.lat}">
                                    <input type="hidden" name="lon" th:value="${loc.lon}">
                                    <input type="hidden" name="country" th:value="${loc.country}">
                                    <input type="hidden" name="state" th:value="${loc.state}">
                                    <button class="btn btn-primary w-100" type="submit">Add</button>
                                </form>

                                <span class="badge bg-success w-100 text-center"
                                      th:if="${locationSaved[loc.name() + '-' + loc.country() + '-' + (loc.state != null ? loc.state : '')]}">
                                    Saved
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
