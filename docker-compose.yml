version: '3.8'

services:
  db:
    image: postgres:15
    container_name: weather-db
    environment:
      POSTGRES_DB: weather_tracker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres.Ilias
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: weather-app
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data: